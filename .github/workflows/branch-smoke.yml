name: Branch Smoke (no deploy)

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show branch and commit
        run: |
          echo "Branch: $GITHUB_REF_NAME"
          echo "Commit: $GITHUB_SHA"

      - name: Basic node syntax checks (best effort)
        shell: bash
        run: |
          node -v || true
          node -c backend/index.js
          node -c backend/routes/lsightRtc.js

